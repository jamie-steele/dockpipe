# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "dockpipe"

[setup]
script = ""

[setup.win32]
script = '''
set -euo pipefail
cd "$CODEX_WORKTREE_PATH"

mkdir -p "$CODEX_WORKTREE_PATH/bin/.dockpipe/tmp"

for tool in git go; do
  command -v "$tool" >/dev/null ||
    { echo "DockPipe requires $tool on PATH"; exit 1; }
done

git --version
go version

test -x ./src/bin/dockpipe ||
  { echo "Missing repo-local ./src/bin/dockpipe"; exit 1; }

./src/bin/dockpipe --version

# Optional tooling is reported for visibility only; core DockPipe setup does not require it.
for tool in docker node npm python gh; do
  if command -v "$tool" >/dev/null 2>&1; then
    printf "Optional %s: available at %s\n" "$tool" "$(command -v "$tool")"
  else
    printf "Optional %s: not found\n" "$tool"
  fi
done'''
[[actions]]
name = "Build DockPipe"
icon = "tool"
command = "mkdir -p bin/.dockpipe/go-build-cache && GOCACHE=\"$PWD/bin/.dockpipe/go-build-cache\" go build ./src/..."

[[actions]]
name = "Test DorkPipe package"
icon = "test"
command = "mkdir -p bin/.dockpipe/go-build-cache && GOCACHE=\"$PWD/bin/.dockpipe/go-build-cache\" ./src/bin/dockpipe package test --workdir . --only dorkpipe"
[[actions]]
name = "Review working tree"
icon = "tool"
command = "git status --short && git diff --check"

[[actions]]
name = "Test DockPipe core"
icon = "test"
command = "mkdir -p bin/.dockpipe/go-build-cache && GOCACHE=\"$PWD/bin/.dockpipe/go-build-cache\" go test ./src/..."

[[actions]]
name = "Refresh DorkPipe workflows"
icon = "run"
command = "./src/bin/dockpipe package compile workflows --workdir . --from packages/dorkpipe --force"
