# Full DockPipe path: Compose sidecars up → isolated DorkPipe self-analysis → Compose down.
# Step order is the workflow contract (no separate manual dev-stack.sh unless you prefer).
#
#   ./src/bin/dockpipe --workflow dorkpipe-self-analysis-stack --workdir . --
#
# Leave Ollama/Postgres running after (e.g. for another job):
#   DORKPIPE_DEV_STACK_AUTODOWN=0 ./src/bin/dockpipe --workflow dorkpipe-self-analysis-stack --workdir . --
name: dorkpipe-self-analysis-stack
description: >-
  stack_up (host): Postgres+Ollama via docker compose.
  self_analysis (container): same as dorkpipe-self-analysis.
  stack_down (host): compose down unless DORKPIPE_DEV_STACK_AUTODOWN=0.

runtime: docker
resolver: codex
runtimes: [dockerimage]

steps:
  - id: stack_up
    skip_container: true
    run:
      - scripts/dorkpipe/dev-stack-ensure-up.sh

  - id: self_analysis
    runtime: docker
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      cd /work
      export DOCKPIPE_WORKDIR=/work
      # No apt-get: dockpipe maps the container user to the host uid, so apt cannot run as root.
      # golang:bookworm images ship git and curl; scripts fall back to grep if ripgrep is absent.
      if [[ ! -x bin/dorkpipe ]]; then
        echo "[dorkpipe-self-analysis] building bin/dorkpipe in container..."
        go build -trimpath -o bin/dorkpipe ./src/cmd/dorkpipe
      fi
      exec bash scripts/dorkpipe/run-self-analysis.sh'

  - id: stack_down
    skip_container: true
    run:
      - scripts/dorkpipe/dev-stack-maybe-down.sh
