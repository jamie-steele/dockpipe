# Pipeline: run → apply → validate (customize cmds for your stack: terraform, k8s, etc.)
name: run-apply-validate
description: Three sequential steps — run phase, apply phase, validate phase.
platforms: [windows, deb]
dependencies:
  host:
    - id: docker
      command: docker
      description: Required to run the isolated example steps.
      install:
        windows: winget install Docker.DockerDesktop
        deb: sudo apt-get update && sudo apt-get install -y docker.io docker-compose-plugin

steps:
  - id: run
    runtime: dockerimage
    isolate: alpine
    cmd: sh -c 'echo "[run] phase" >&2'
  - id: apply
    runtime: dockerimage
    isolate: alpine
    cmd: sh -c 'echo "[apply] phase" >&2'
  - id: validate
    runtime: dockerimage
    isolate: alpine
    cmd: sh -c 'echo "[validate] phase" >&2'
