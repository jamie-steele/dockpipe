# Quick GUI demo: code-server in Docker (host script publishes a local port). Project → /work in the container.
# From this repo: dockpipe --workflow demo-gui-vscode --resolver vscode --runtime docker --workdir .
name: demo-gui-vscode
description: >-
  Browser VS Code (OSS code-server): your project directory is mounted at /work inside the server
  container (same pattern as other dockpipe runs). Use --workdir to point at this or any checkout.

runtime: docker
resolver: vscode
runtimes: [docker, cli]
resolvers: [vscode]

steps:
  - id: code-server
    run: scripts/vscode-code-server.sh
    skip_container: true
    vars:
      CODE_SERVER_IMAGE: "dockpipe-code-server:latest"
      CODE_SERVER_AUTH: "none"
      CODE_SERVER_LAUNCH: "app"
