# This repo’s CI: scans only (no go test). Container runs go vet; govulncheck/gosec run on the host in CI.
# See dockpipe/workflows/test-demo for tests → go vet → Codex review (recordings).
# Images: golang official (pulls from Docker Hub on first use).
name: test
description: >-
  Isolation preamble → verify artifact → go vet (static scan in container) → security brief (static copy in this workflow).
  For video: workflow test-demo (real tests → go vet → Codex resolver). Govulncheck/gosec stay in the CI job on the host.

steps:
  - id: prepare
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      echo "[demo] ================================================================="
      echo "[demo] Isolation — each step runs in a fresh container; your repo is mounted"
      echo "[demo] at /work with your UID/GID mapped. Containers are removed after each step."
      echo "[demo] ================================================================="
      mkdir -p .dockpipe/demo
      printf "%s\n" "package main" "func main() {}" > .dockpipe/demo/main.go
      SHA=$(sha256sum .dockpipe/demo/main.go | cut -b1-64)
      mkdir -p .dockpipe
      printf "%s\n" "ARTIFACT_SHA256=$SHA" "DEMO_FILE=.dockpipe/demo/main.go" "DEMO_STAGE=prepare" > .dockpipe/outputs.env
      echo "[demo] step 1/3 prepare — wrote demo artifact + checksum for next step"'

  - id: scan
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      echo "[demo] --- Step 2: verify artifact + scan (go vet) — no go test; govulncheck runs on host in CI ---"
      test -n "${ARTIFACT_SHA256:-}" || { echo "[demo] FAIL missing ARTIFACT_SHA256"; exit 1; }
      test -f "$DEMO_FILE" || { echo "[demo] FAIL missing $DEMO_FILE"; exit 1; }
      GOT=$(sha256sum "$DEMO_FILE" | cut -b1-64)
      test "$GOT" = "$ARTIFACT_SHA256" || { echo "[demo] FAIL checksum mismatch"; exit 1; }
      echo "[demo] Checksum OK — same bytes on disk as in step 1."
      echo "[demo] Running: go vet ./...  (static analysis in this container)"
      go vet ./...
      echo "[demo] Container scan finished with exit 0. (govulncheck/gosec run on the host in CI.)"
      mkdir -p .dockpipe
      printf "%s\n" "VERIFY_OK=1" "SCAN_PASS=1" "DEMO_STAGE=scan" > .dockpipe/outputs.env'

  - id: report
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      test "${SCAN_PASS:-0}" = "1" || { echo "[demo] FAIL SCAN_PASS not set"; exit 1; }
      echo "[demo] step 3/3 report — SCAN_PASS=$SCAN_PASS VERIFY_OK=$VERIFY_OK"
      echo "[demo] --- Security brief (bundled demo narrative — not a live LLM call) ---"
      echo "[demo] • Isolation: commands run in disposable containers; only the bind-mounted"
      echo "[demo]   workdir persists between steps; review images and workflow YAML like CI."
      echo "[demo] • Data paths: treat host run:/act: scripts as part of your trust boundary."
      echo "[demo] • Supply chain: pin image digests in production; this workflow uses"
      echo "[demo]   golang:1.25-bookworm for reproducible test runs."
      echo "[demo] • For an actual model-driven security review, use a resolver workflow"
      echo "[demo]   (e.g. Codex) with your policy — this block is static showcase copy."
      echo "[demo] pipeline complete — go vet in isolation + security brief emitted"'
