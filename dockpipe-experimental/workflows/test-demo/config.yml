# Demo: prepare → go test → go vet → deterministic review prep → local Ollama summary (isolate: ollama) → Codex final review.
# Prep writes .dockpipe/review-context.md; Codex reads it — see templates/core/assets/scripts/review/README.md
# API keys: OPENAI_API_KEY / CODEX_API_KEY. Codex: --dangerously-bypass-approvals-and-sandbox (no nested bwrap in Docker).
name: test-demo
description: >-
  Chain: metadata → go test → go vet → collect/aggregate review bundle → local Ollama (dockpipe-ollama) →
  Codex final review. State via .dockpipe/outputs.env; artifacts under .dockpipe/.

runtime: docker
resolver: codex
runtimes: [docker, cli]
resolvers: [codex]

steps:
  - id: prepare
    runtime: docker
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      mkdir -p .dockpipe/demo
      printf "%s\n" \
        "WORKFLOW_NAME=test-demo" \
        "PREPARE_OK=1" \
        "DEMO_STAGE=prepare" \
        > .dockpipe/outputs.env
      echo "[test-demo] prepare: workflow chain initialized"'

  - id: gotest
    runtime: docker
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      mkdir -p .dockpipe
      set +e
      go test ./... -count=1
      tc=$?
      set -e
      tp=0
      if [ "$tc" -eq 0 ]; then tp=1; fi
      printf "%s\n" "TESTS_PASS=$tp" "TESTS_EXIT=$tc" "DEMO_STAGE=gotest" > .dockpipe/outputs.env
      echo "[test-demo] go test finished exit=$tc"
      exit "$tc"'

  - id: scan
    runtime: docker
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      test "${TESTS_PASS:-0}" = "1" || { echo "[test-demo] go test did not pass; skipping go vet" >&2; exit 1; }
      set +e
      go vet ./...
      vc=$?
      set -e
      sp=0
      if [ "$vc" -eq 0 ]; then sp=1; fi
      printf "%s\n" "SCAN_PASS=$sp" "VET_EXIT=$vc" "DEMO_STAGE=scan" > .dockpipe/outputs.env
      echo "[test-demo] go vet finished exit=$vc"
      exit "$vc"'

  - id: collect-signals
    runtime: docker
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      test "${SCAN_PASS:-0}" = "1" || { echo "[test-demo] scan did not pass; skipping review prep" >&2; exit 1; }
      mkdir -p .dockpipe
      bash scripts/review/collect-go-review-signals.sh
      NFC=$(wc -l < .dockpipe/review-files.txt | tr -d " ")
      NSL=$(wc -l < .dockpipe/review-signals.txt | tr -d " ")
      printf "%s\n" \
        "REVIEW_PREP_OK=1" \
        "REVIEW_FILES_COUNT=$NFC" \
        "REVIEW_SIGNALS_LINES=$NSL" \
        "DEMO_STAGE=collect-signals" \
        > .dockpipe/outputs.env
      echo "[test-demo] collect: ${NFC} go files, ${NSL} signal lines"'

  - id: aggregate-context
    runtime: docker
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      test "${REVIEW_PREP_OK:-0}" = "1" || { echo "[test-demo] review prep failed" >&2; exit 1; }
      bash scripts/review/aggregate-review-context.sh
      printf "%s\n" \
        "REVIEW_CONTEXT_READY=1" \
        "DEMO_STAGE=aggregate" \
        > .dockpipe/outputs.env
      echo "[test-demo] bundle: .dockpipe/review-context.md"'

  # isolate: ollama → dockpipe builds dockpipe-ollama (templates/core/assets/images/ollama); script starts ollama serve then summarizes.
  - id: local-summary
    runtime: docker
    isolate: ollama
    cmd: |-
      bash -c 'set -euo pipefail
        test "${REVIEW_CONTEXT_READY:-0}" = "1" || exit 1
        bash scripts/review/run-local-model-with-ollama-daemon.sh'

  - id: review
    runtime: docker
    resolver: codex
    isolate: codex
    vars:
      RUST_LOG: error
    cmd: |-
      bash -c 'set -euo pipefail
      test "${REVIEW_CONTEXT_READY:-0}" = "1" || { echo "[test-demo] review bundle not ready" >&2; exit 1; }
      test -n "${OPENAI_API_KEY:-}${CODEX_API_KEY:-}" || { echo "[test-demo] OPENAI_API_KEY or CODEX_API_KEY is required" >&2; exit 1; }
      export CODEX_API_KEY="${CODEX_API_KEY:-$OPENAI_API_KEY}"
      test -f .dockpipe/review-context.md || { echo "[test-demo] missing .dockpipe/review-context.md" >&2; exit 1; }
      PROMPT_FILE="dockpipe/workflows/test-demo/prompts/codex-final-review.md"
      test -f "$PROMPT_FILE" || { echo "[test-demo] missing $PROMPT_FILE" >&2; exit 1; }
      { cat "$PROMPT_FILE"; echo ""; echo "Prep file on disk: /work/.dockpipe/review-context.md"; } | codex exec --dangerously-bypass-approvals-and-sandbox -'