# Host flatpak run — requires flatpak + Flathub on the system; FLATHUB_APP_ID from env (Pipeon "Extra dockpipe env").
name: flathub-host
category: app
description: >-
  Runs a Flathub app on the host via flatpak run. Set FLATHUB_APP_ID (e.g. from Pipeon Flathub browser or --env).
  For Docker + Flatpak caches see steam-flatpak-docker and package-cache-demo.

docker_preflight: false

steps:
  - id: flatpak
    run: scripts/flathub-host-run.sh
    skip_container: true
