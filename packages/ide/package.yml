schema: 1
kind: package
name: ide
version: 0.6.0
title: DockPipe IDE resolvers
platforms: [windows, deb]
description: |
  Compatibility resolvers for user-installed desktop editors (vscode,
  cursor-dev) plus read-only native Dev Container discovery/status. First-party
  Pipeon lives under packages/pipeon/ in this repo.
author: DockPipe
license: Apache-2.0
repository: https://github.com/dockpipe/dockpipe
icon: resolvers/cursor-dev/assets/images/icon.png
artwork:
  cursor-dev: resolvers/cursor-dev/assets/images/icon.png
  vscode: resolvers/vscode/assets/images/icon.png
tags: [resolver, ide, editor]
includes_resolvers:
  - vscode
  - cursor-dev
  - devcontainer
test:
  script: tests/run.sh
script_contract:
  inject: [workdir, workflow_name, script_dir, package_root, assets_dir, dockpipe_bin]
