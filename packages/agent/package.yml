schema: 1
kind: package
name: agent
version: 0.6.0
title: DockPipe agent workflows and resolvers
description: |
  First-party agent-oriented package family for governed AI stages. Resolver profiles such as codex
  and claude stay separate from the workflow contract; workflows under workflows/ define the bounded
  inputs, outputs, and approval rules for specific tasks such as documentation generation.
author: DockPipe
license: Apache-2.0
repository: https://github.com/dockpipe/dockpipe
tags: [resolver, workflow, agents, ai, docs]
includes_resolvers:
  - claude
  - codex
  - ollama
script_contract:
  inject: [workdir, workflow_name, script_dir, package_root, assets_dir, dockpipe_bin]
test:
  script: tests/run.sh
