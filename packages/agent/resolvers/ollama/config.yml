# Bundled workflow for resolver ollama and DOCKPIPE_RESOLVER_WORKFLOW=ollama.
name: ollama
description: Local Ollama with dockpipe entrypoint (dockpipe-ollama image).
platforms: [windows, deb]
dependencies:
  host:
    - id: docker
      command: docker
      description: Required to run the Ollama resolver image.
      install:
        windows: winget install Docker.DockerDesktop
        deb: sudo apt-get update && sudo apt-get install -y docker.io docker-compose-plugin

steps:
  - id: ollama
    isolate: ollama
