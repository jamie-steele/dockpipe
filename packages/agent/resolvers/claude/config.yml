# Bundled workflow for resolver claude and DOCKPIPE_RESOLVER_WORKFLOW=claude.
# Used after worktree strategy clone; parent runs commit-worktree on the host.
name: claude
description: Claude Code in a worktree (dockpipe-claude image).

image:
  packages:
    apt:
      - build-essential
      - cargo
      - golang-go
      - python3
      - rustc

steps:
  - id: claude
    isolate: claude
