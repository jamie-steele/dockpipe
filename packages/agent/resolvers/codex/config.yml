# Bundled workflow for resolver codex and DOCKPIPE_RESOLVER_WORKFLOW=codex.
# Used after worktree strategy clone; parent runs commit-worktree on the host.
name: codex
description: OpenAI Codex CLI in a worktree (dockpipe-codex image).

image:
  packages:
    apt:
      - build-essential
      - cargo
      - golang-go
      - python3
      - rustc

steps:
  - id: codex
    isolate: codex
