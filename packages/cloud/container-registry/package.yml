schema: 1
kind: package
name: cloud.container-registry
version: 0.6.0
title: DockPipe container registries
description: |
  Umbrella for OCI/container registry publish workflows. Package id cloud.container-registry;
  resolver ghcr -> dotted cloud.container-registry.ghcr. Resolvers under resolvers/ are optional
  backends for concrete registries and may host one or more workflows.
author: DockPipe
license: Apache-2.0
repository: https://github.com/dockpipe/dockpipe
tags: [workflow, registry, container, oci, ghcr, github]
includes_resolvers:
  - ghcr
script_contract:
  inject: [workdir, workflow_name, script_dir, package_root, assets_dir, dockpipe_bin]
