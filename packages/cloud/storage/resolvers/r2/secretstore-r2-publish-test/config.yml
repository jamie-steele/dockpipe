# Dogfood: 1Password (op inject) → merge env → r2-publish (same dockpipe run).
#
# Mapping (start here):
#   - 1Password → env NAMES: edit .env.op.template under --workdir (see vars OP_ENV_FILE).
#     Each line VAR=op://… ; op inject fills values; DockPipe passes VAR to step 2 unchanged.
#   - Hint list only: packages/secrets/resolvers/onepassword/profile (DOCKPIPE_RESOLVER_ENV).
#   - r2-publish vars: packages/cloud/storage/resolvers/r2/dockpipe.cloudflare.r2publish/README.md
# Full walkthrough: README.md in this directory.
#
# Try from repo root:
#   cp packages/secrets/resolvers/onepassword/.env.op.template.example .env.op.template
#   # edit with real op:// references for R2_* / CLOUDFLARE_* etc.
#   mkdir -p release/artifacts && touch release/artifacts/.keep
#   dockpipe --workflow-file packages/cloud/storage/resolvers/r2/secretstore-r2-publish-test/config.yml --workdir . \
#     --var R2_TF_BACKEND=local --   # optional: skip remote TF state while testing
#
name: secretstore-r2-publish-test
workflow_type: secretstore
description: >-
  Test pipeline: op inject secrets into an outputs file, DockPipe merges into env, then r2-publish.
platforms: [windows, deb]
dependencies:
  host:
    - id: bash
      command: bash
      description: Required to run the secretstore and R2 publish scripts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y bash
    - id: op
      command: op
      description: Required to inject secrets from 1Password.
      install:
        windows: winget install AgileBits.1Password.CLI
        deb: sudo apt-get update && sudo apt-get install -y 1password-cli
    - id: wrangler
      command: wrangler
      description: Required for the default Cloudflare R2 upload path.
      install:
        windows: winget install OpenJS.NodeJS.LTS
        deb: sudo apt-get update && sudo apt-get install -y npm && sudo npm install -g wrangler

docker_preflight: false
# Secrets: package-provided op scripts (not workflow-level vault: merge).
types:
  - models/ISecretstoreR2PublishTestConfig
vars:
  OP_ENV_FILE: ".env.op.template"
  SECRET_ENV_OUT: "secretstore-r2.env"

steps:
  - id: inject-secrets
    kind: host
    outputs: "secretstore-r2.env"
    run:
      - scripts/onepassword/secretstore-op-inject-outputs.sh

  - id: publish-r2
    kind: host
    run:
      - scripts/dockpipe/r2-publish.sh
