name: dockpipe.cloudflare.r2infra
namespace: dockpipe-cloudflare
description: >-
  Terraform-only for the Cloudflare R2 module under dockpipe.cloudflare.r2publish/terraform.
  Secrets: vault / .env. Non-secret TF_VAR_* below. Follow with dockpipe.cloudflare.r2upload for objects.

docker_preflight: false

vars:
  CLOUDFLARE_ACCOUNT_ID: ""  # required for apply; 32-char hex account id (or R2 endpoint URL parsed by script)
  CLOUDFLARE_API_TOKEN: ""  # or set CLOUDFLARE_EMAIL + CLOUDFLARE_GLOBAL_API_KEY
  CLOUDFLARE_EMAIL: ""  # legacy auth; use with CLOUDFLARE_GLOBAL_API_KEY
  CLOUDFLARE_GLOBAL_API_KEY: ""  # legacy global API key
  DOCKPIPE_TF_APPLY_ARGS: ""  # extra terraform apply args
  DOCKPIPE_TF_APPLY_AUTO_APPROVE: "1"  # 1 = -auto-approve on apply
  DOCKPIPE_TF_ATTACH_CLOUDFLARE_PROVIDER: "1"  # must stay 1 for this workflow (Cloudflare provider + bucket TF_VAR)
  DOCKPIPE_TF_BACKEND: "remote"  # remote = R2 S3 backend; local = no remote state
  DOCKPIPE_TF_BACKEND_HCL_PATH: ""  # usually empty; runner generates temp backend HCL unless DOCKPIPE_TF_REMOTE_BACKEND_FILE set
  DOCKPIPE_TF_CLOUDFLARE_ACCOUNT_ID: ""  # optional override for backend writer
  DOCKPIPE_TF_COMMANDS: ""  # empty uses map default init,apply; override with --tf plan or set explicitly
  DOCKPIPE_TF_DRY_RUN: "0"  # 1 = print only
  DOCKPIPE_TF_FMT_ARGS: ""  # extra terraform fmt args
  DOCKPIPE_TF_IMPORT_ARGS: ""  # e.g. cloudflare_r2_bucket.publish account/bucket/jurisdiction
  DOCKPIPE_TF_IMPORT_FILE: ""  # multi-line import file path
  DOCKPIPE_TF_IMPORT_R2_BUCKET: "0"  # 1 = auto-set DOCKPIPE_TF_IMPORT_ARGS for existing bucket import
  DOCKPIPE_TF_INIT_ARGS: ""  # e.g. -reconfigure after backend bucket/key change
  DOCKPIPE_TF_MODULE_DIR: ""  # optional explicit path to terraform root; else bundled r2publish/terraform when USE_R2 map
  DOCKPIPE_TF_OPTIONAL_WHEN_UNSET: "0"  # 1 = skip Terraform if DOCKPIPE_TF_COMMANDS empty (parent workflows use --tf)
  DOCKPIPE_TF_PIPELINE_HINT: ""  # internal; rarely set in YAML
  DOCKPIPE_TF_PLAN_ARGS: ""  # extra terraform plan args
  DOCKPIPE_TF_REMOTE_BACKEND_FILE: ""  # if set, use this backend HCL instead of generating R2 backend
  DOCKPIPE_TF_R2_IMPORT_JURISDICTION: "default"  # Cloudflare R2 jurisdiction when importing bucket
  DOCKPIPE_TF_SKIP_INIT: "0"  # 1 = skip auto-init
  DOCKPIPE_TF_STATE_ACCESS_KEY_ID: ""  # R2 S3 API state access (or R2_STATE_ACCESS_KEY_ID / AWS_*)
  DOCKPIPE_TF_STATE_BUCKET: "dockpipe"  # dedicated state bucket name (not the public publish bucket name)
  DOCKPIPE_TF_STATE_KEY: "state/dockpipe.cloudflare.r2publish/terraform.tfstate"  # object key for state file
  DOCKPIPE_TF_STATE_SECRET_ACCESS_KEY: ""  # paired with state access key
  DOCKPIPE_TF_USE_R2_PUBLISH_MAP: "1"  # must stay 1 for this workflow (R2_* → DOCKPIPE_TF_* mapping)
  DOCKPIPE_TF_VALIDATE_ARGS: ""  # extra terraform validate args
  DOCKPIPE_TF_WORKSPACE: ""  # terraform workspace name if not default
  R2_BUCKET: "dockpipe"  # R2 bucket name for resources and TF_VAR_bucket_name
  R2_PUBLISH_DRY_RUN: "0"  # 1 = dry-run for r2-publish compatibility (mapped into DOCKPIPE_TF_DRY_RUN)
  R2_STATE_ACCESS_KEY_ID: ""  # alias mapped to DOCKPIPE_TF_STATE_* when unset
  R2_STATE_SECRET_ACCESS_KEY: ""
  R2_TF_BACKEND: ""  # legacy; maps to DOCKPIPE_TF_BACKEND when DOCKPIPE_TF_BACKEND unset
  R2_TF_IMPORT_R2_BUCKET: ""  # legacy alias for DOCKPIPE_TF_IMPORT_R2_BUCKET
  R2_TF_R2_IMPORT_JURISDICTION: ""  # legacy alias
  R2_TF_STATE_BUCKET: ""  # legacy alias for state bucket
  R2_TF_STATE_KEY: ""  # legacy alias for state key
  R2_TERRAFORM_APPLY_ARGS: ""  # legacy alias for DOCKPIPE_TF_APPLY_ARGS
  R2_TERRAFORM_APPLY_AUTO_APPROVE: ""  # legacy alias
  R2_TERRAFORM_COMMANDS: ""  # legacy alias for DOCKPIPE_TF_COMMANDS
  R2_TERRAFORM_FMT_ARGS: ""
  R2_TERRAFORM_IMPORT_ARGS: ""
  R2_TERRAFORM_IMPORT_FILE: ""
  R2_TERRAFORM_INIT_ARGS: ""
  R2_TERRAFORM_PLAN_ARGS: ""
  R2_TERRAFORM_SKIP_INIT: ""
  R2_TERRAFORM_VALIDATE_ARGS: ""
  R2_TERRAFORM_DIR: ""  # optional explicit terraform directory path
  R2_TF_LOCATION: ""  # optional TF_VAR_location (region hint WEUR, WNAM, …)
  TF_VAR_cache_browser_ttl_seconds: "3600"  # browser cache TTL for cache rules
  TF_VAR_cache_edge_ttl_seconds: "86400"  # edge cache TTL
  TF_VAR_cloudflare_managed_ruleset_id: "efb7b8c949ac4650a09736fc376e9aee"  # Cloudflare managed ruleset UUID
  TF_VAR_enable_cache_rules: "true"  # true|false
  TF_VAR_enable_r2_custom_domain: "true"  # true|false
  TF_VAR_enable_waf_baseline: "true"  # true|false
  TF_VAR_public_hostname: "packages.example.com"  # hostname for R2 custom domain + rules
  TF_VAR_r2_custom_domain_enabled: "true"  # true|false
  TF_VAR_r2_custom_domain_min_tls: "1.2"  # e.g. 1.0 | 1.2 | 1.3
  TF_VAR_zone_id: "REPLACE_WITH_CLOUDFLARE_ZONE_ID"  # Cloudflare zone id (32-char hex)

steps:
  - id: terraform
    skip_container: true
    run:
      - scripts/dockpipe.cloudflare.r2publish/terraform-cloudflare-r2-run.sh
