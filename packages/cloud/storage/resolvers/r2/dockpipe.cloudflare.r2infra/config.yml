name: dockpipe.cloudflare.r2infra
namespace: dockpipe-cloudflare
description: >-
  Terraform-only for the Cloudflare R2 module under dockpipe.cloudflare.r2publish/terraform.
  Secrets: vault / .env. Non-secret TF_VAR_* below. Follow with dockpipe.cloudflare.r2upload for objects.
  PipeLang defaults are typed in IR2InfraConfig/R2InfraConfig and projected directly to matching env names.

types:
  - models/IR2InfraConfig

docker_preflight: false

vars:
  # Commonly changed values only. Advanced defaults and compatibility aliases are
  # handled by IR2InfraConfig/R2InfraConfig defaults + terraform-cloudflare-r2-run.sh.
  CLOUDFLARE_ACCOUNT_ID: ""  # required for apply; 32-char account id
  CLOUDFLARE_API_TOKEN: ""  # preferred auth (or legacy email + global key via env)
  R2_BUCKET: "dockpipe"  # public/package bucket name
  DOCKPIPE_TF_COMMANDS: ""  # e.g. init,plan | init,apply
  DOCKPIPE_TF_DRY_RUN: "0"  # 1 = print commands only
  TF_VAR_public_hostname: "packages.example.com"  # r2 custom domain hostname
  TF_VAR_zone_id: "REPLACE_WITH_CLOUDFLARE_ZONE_ID"  # Cloudflare zone id

steps:
  - id: terraform
    skip_container: true
    run:
      - scripts/dockpipe.cloudflare.r2infra/terraform-cloudflare-r2-run.sh
