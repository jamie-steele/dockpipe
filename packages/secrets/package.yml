schema: 1
kind: package
name: secrets
version: 0.6.0
title: DockPipe secrets resolvers
description: |
  Umbrella package for secret-store and vault-style resolver profiles. Each resolver under
  resolvers/ is optional at install time (e.g. onepassword for 1Password CLI workflows).
author: DockPipe
license: Apache-2.0
repository: https://github.com/dockpipe/dockpipe
tags: [resolver, secrets, vault]
includes_resolvers:
  - onepassword
script_contract:
  inject: [workdir, workflow_name, script_dir, package_root, assets_dir, dockpipe_bin]
