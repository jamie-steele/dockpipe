# Maintainer workflow: secretstore with 1Password CLI (op). Not part of lean src/core bundle
# discovery for downstream installs — use in this repo or after packaging this resolver tree.
name: secretstore-onepassword
workflow_type: secretstore
description: >-
  Host-only: SECRETSTORE_COMMAND runs under env from op run --env-file (.env.op.template with op:// refs).
  Copy packages/secrets/resolvers/onepassword/.env.op.template.example to .env.op.template

docker_preflight: false

types:
  - models/ISecretstoreOnepasswordConfig

vars:
  SECRETSTORE_PROVIDER: "op"
  OP_ENV_FILE: ".env.op.template"

steps:
  - id: exec-with-secrets
    runtime: dockerimage
    resolver: onepassword
    skip_container: true
    run:
      - scripts/onepassword/secretstore-op-exec.sh
