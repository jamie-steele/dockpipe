name: orchestrate.stack
namespace: dockpipeproject
description: >-
  Package-owned DorkPipe orchestration wrapper: stack up, plan, run workers, merge, verify,
  approval, apply, and finally stack down. When called from a consumer workflow step, planning
  reads the caller workflow config and step orchestration block by default.

docker_preflight: false
platforms: [windows, deb]
dependencies:
  host:
    - id: bash
      command: bash
      description: Runs DorkPipe orchestration host scripts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y bash
    - id: docker
      command: docker
      description: Starts the DorkPipe sidecar stack and resolver worker containers.
      install:
        windows: winget install Docker.DockerDesktop
        deb: sudo apt-get update && sudo apt-get install -y docker.io docker-compose-plugin
    - id: git
      command: git
      description: Reads repository state and applies approved generated artifacts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y git
    - id: curl
      command: curl
      description: Checks local Ollama and DorkPipe stack HTTP endpoints.
      install:
        windows: winget install cURL.cURL
        deb: sudo apt-get update && sudo apt-get install -y curl

types:
  - models/IOrchestrateStackConfig.pipe

vars:
  DORKPIPE_ORCH_SOURCE_STEP_ID: plan
  DORKPIPE_DEV_STACK_GPU: "auto"
  DORKPIPE_DEV_STACK_GPU_SETUP: "never"
  DORKPIPE_DEV_STACK_GPU_ON_FAILURE: "cpu"
  DORKPIPE_DEV_STACK_SERVICES: "postgres ollama dorkpipe-stack dorkpipe-mcp-proxy"

steps:
  - id: plan
    kind: host
    run: scripts/dorkpipe/orchestrate-plan.sh

  - id: auth_preflight
    kind: host
    run: scripts/dorkpipe/orchestrate-auth-preflight.sh

  - id: stack_up
    kind: host
    run: scripts/dorkpipe/dev-stack-ensure-up.sh

  - id: run_workers
    kind: host
    run: scripts/dorkpipe/orchestrate-run-tasks.sh

  - id: merge
    kind: host
    run: scripts/dorkpipe/orchestrate-merge-results.sh

  - id: verify
    kind: host
    run: scripts/dorkpipe/orchestrate-verify-results.sh

  - id: approval
    kind: host
    run: scripts/dorkpipe/orchestrate-approve.sh

  - id: apply
    kind: host
    run: scripts/dorkpipe/orchestrate-apply-results.sh

finally:
  - id: stack_down
    kind: host
    run:
      - scripts/dorkpipe/dev-stack-maybe-down.sh
