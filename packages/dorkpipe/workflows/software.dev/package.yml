schema: 1
kind: workflow
name: software.dev
version: 0.6.0
title: Governed Software Development
description: |
  Package-owned software-development orchestration that compiles a repo workflow step and optional
  planner proposal inside fixed DorkPipe authority, approval, apply, publish, and sync boundaries.
author: DockPipe
license: Apache-2.0
repository: https://github.com/dockpipe/dockpipe
tags: [workflow, dorkpipe, software-development, orchestration]
depends: [dorkpipe]
platforms: [windows, deb]
dependencies:
  host:
    - id: bash
      command: bash
      description: Runs package-owned orchestration scripts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y bash
    - id: git
      command: git
      description: Reads repository state and applies approved materialized artifacts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y git
allow_clone: true
distribution: source
