name: skills.render
namespace: dockpipeproject
description: Render curated DorkPipe skills to assistant-specific local formats.
docker_preflight: false
platforms: [windows, deb]
dependencies:
  host:
    - id: bash
      command: bash
      description: Runs the skills render wrapper script.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y bash
    - id: go
      command: go
      description: Builds the skills-render helper from source when no compiled helper is present.
      install:
        windows: winget install GoLang.Go
        deb: sudo apt-get update && sudo apt-get install -y golang-go

steps:
  - id: render
    kind: host
    run: scripts/dorkpipe/skills-render.sh
