# Internal workflow: run the DorkPipe orchestrator (bin/dorkpipe) on a DAG spec.
# This repo: orchestration is a separate binary that still calls `dockpipe` for tool steps.
name: dorkpipe-orchestrator
description: >-
  Host step runs scripts/dorkpipe-orchestrator/run-orchestrator.sh (requires `make build` for bin/dorkpipe).

resolver: codex

steps:
  - id: orchestrate
    kind: host
    run:
      - scripts/dorkpipe-orchestrator/run-orchestrator.sh
