# Full DockPipe path: Compose sidecars up → isolated DorkPipe self-analysis → Compose down.
# Step order is the workflow contract (no separate manual dev-stack.sh unless you prefer).
#
#   dockpipe --workflow dorkpipe-self-analysis-stack --workdir . --
#
# Leave Ollama/Postgres running after (e.g. for another job):
#   DORKPIPE_DEV_STACK_AUTODOWN=0 dockpipe --workflow dorkpipe-self-analysis-stack --workdir . --
name: dorkpipe-self-analysis-stack
description: >-
  stack_up (host): Postgres+Ollama via the DorkPipe host stack script with GPU-aware Ollama setup.
  self_analysis (container): same as dorkpipe-self-analysis.
  stack_down (host): compose down unless DORKPIPE_DEV_STACK_AUTODOWN=0.

steps:
  - id: stack_up
    kind: host
    run:
      - scripts/dorkpipe/dev-stack.sh
      - up
    vars:
      DORKPIPE_DEV_STACK_GPU: "auto"
      DORKPIPE_DEV_STACK_GPU_SETUP: "never"
      DORKPIPE_DEV_STACK_GPU_ON_FAILURE: "cpu"
      DORKPIPE_DEV_STACK_SERVICES: "postgres ollama"

  - id: self_analysis
    runtime: dockerimage
    isolate: golang:1.25-bookworm
    cwd: repo
    vars:
      DATABASE_URL: postgresql://dorkpipe:dorkpipe@host.docker.internal:15432/dorkpipe
      OLLAMA_HOST: http://host.docker.internal:11434
    run:
      - scripts/dorkpipe/run-self-analysis.sh

  - id: stack_down
    kind: host
    run:
      - scripts/dorkpipe/dev-stack-maybe-down.sh
