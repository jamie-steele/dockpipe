# Minimal allowlist proxy for DockPipe-managed DorkPipe container runs.
# The goal is to give DockPipe's compiled proxy-backed network policy path a concrete first
# consumer without making every workflow depend on the proxy path.

http_port 3128
dns_v4_first on
via off
forwarded_for delete
request_header_access X-Forwarded-For deny all
request_header_access Via deny all
request_header_access Proxy deny all

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# DorkPipe self-analysis may need Go module proxy/checksum traffic when it has to
# build `bin/dorkpipe` inside the isolated container. GitHub endpoints cover the
# small amount of repo/bootstrap traffic that current scripts may reach for.
acl allowed_domains dstdomain \
	.proxy.golang.org \
	.sum.golang.org \
	.golang.org \
	.github.com \
	.raw.githubusercontent.com \
	.objects.githubusercontent.com

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_domains
http_access deny all

cache deny all
coredump_dir /var/spool/squid
