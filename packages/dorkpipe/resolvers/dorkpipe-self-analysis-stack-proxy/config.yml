# Full DockPipe path: Compose sidecars up → isolated DorkPipe self-analysis with
# proxy-backed network policy → Compose down.
#
#   dockpipe --workflow dorkpipe-self-analysis-stack-proxy --workdir . --
#
# Leave services up after the run:
#   DORKPIPE_DEV_STACK_AUTODOWN=0 dockpipe --workflow dorkpipe-self-analysis-stack-proxy --workdir . --
name: dorkpipe-self-analysis-stack-proxy
description: >-
  stack_up (host): Postgres+Ollama+policy-proxy via the DorkPipe host stack script with GPU-aware Ollama setup.
  self_analysis (container): same as dorkpipe-self-analysis, but compiled with
  proxy-backed allowlist network policy.
  finally.stack_down (host): compose down unless DORKPIPE_DEV_STACK_AUTODOWN=0.
platforms: [windows, deb]
dependencies:
  host:
    - id: bash
      command: bash
      description: Required to run the packaged dev-stack scripts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y bash
    - id: docker
      command: docker
      description: Required for the DorkPipe sidecar stack and isolated self-analysis container.
      install:
        windows: winget install Docker.DockerDesktop
        deb: sudo apt-get update && sudo apt-get install -y docker.io docker-compose-plugin

security:
  profile: sidecar-client
  network:
    mode: allowlist
    allow:
      - proxy.golang.org
      - sum.golang.org
      - golang.org
      - github.com
      - "*.githubusercontent.com"
steps:
  - id: stack_up
    kind: host
    run:
      - scripts/dorkpipe/dev-stack.sh
      - up
    vars:
      DORKPIPE_DEV_STACK_GPU: "auto"
      DORKPIPE_DEV_STACK_GPU_SETUP: "never"
      DORKPIPE_DEV_STACK_GPU_ON_FAILURE: "cpu"
      DORKPIPE_DEV_STACK_SERVICES: "postgres ollama policy-proxy"

  - id: self_analysis
    runtime: dockerimage
    isolate: golang:1.25-bookworm
    cwd: repo
    vars:
      DATABASE_URL: postgresql://dorkpipe:dorkpipe@host.docker.internal:15432/dorkpipe
      OLLAMA_HOST: http://host.docker.internal:11434
      DOCKPIPE_POLICY_PROXY_URL: http://host.docker.internal:13128
      DOCKPIPE_POLICY_PROXY_NO_PROXY: host.docker.internal,localhost,127.0.0.1,::1
    run:
      - scripts/dorkpipe/run-self-analysis.sh

finally:
  - id: stack_down
    kind: host
    run:
      - scripts/dorkpipe/dev-stack-maybe-down.sh
