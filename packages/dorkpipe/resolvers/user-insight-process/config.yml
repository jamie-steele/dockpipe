# Host-only: normalize DorkPipe package-scope analysis/queue.json → insights.json via the dorkpipe CLI.
name: user-insight-process
description: >-
  Run the packaged user-insight processing host steps and optional export-by-category.
  Uses the dorkpipe CLI user-insight commands. Does not treat user text as truth —
  see docs/artifacts.md and resolvers/user-insight-process/README.md.

docker_preflight: false
steps:
  - id: process
    kind: host
    cwd: repo
    scopes:
      source: repo
      artifacts: artifacts
    run:
      - scripts/dorkpipe/user-insight-process.sh
  - id: export
    kind: host
    cwd: repo
    scopes:
      source: repo
      artifacts: artifacts
    run:
      - scripts/dorkpipe/user-insight-export-by-category.sh
