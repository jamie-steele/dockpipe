schema: 1
kind: package
name: dorkpipe
version: 0.6.0
title: DorkPipe agentic stack package
description: |
  Single umbrella package for DorkPipe workflows: orchestrator, self-analysis variants,
  compliance-handoff, user-insight-process, and the package-owned DorkPipe stack/control plane.
  Consumer repos run these capabilities from compiled package artifacts; checkout-only source rebuild
  flows remain opt-in maintainer paths.
author: DockPipe
license: Apache-2.0
repository: https://github.com/dockpipe/dockpipe
icon: assets/images/icon.png
tags: [dorkpipe, orchestration, stack, agentic]
artwork:
  icon: assets/images/icon.png
includes_resolvers:
  - compliance-handoff
  - dorkpipe-orchestrator
  - dorkpipe-self-analysis
  - dorkpipe-self-analysis-host
  - dorkpipe-self-analysis-stack
  - dorkpipe
  - user-insight-process
script_contract:
  inject: [workdir, workflow_name, script_dir, package_root, assets_dir, dockpipe_bin]
build:
  source:
    script: assets/scripts/build-source.sh
test:
  script: tests/run.sh
