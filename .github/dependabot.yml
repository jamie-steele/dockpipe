# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# PRs target `staging` so merges do not land on `master` directly (push to `master` runs Release).
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    open-pull-request-limit: 5
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    open-pull-request-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"
