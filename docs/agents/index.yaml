schema: 1
description: Machine-readable routing map for DockPipe agent guidance. Skill ids are target-independent; renderers decide Codex, Claude, or generic format.

skills:
  installed_codex:
    - dorkpipe-agentic-yaml
    - dorkpipe-core-review
    - dorkpipe-package-authoring
    - dorkpipe-token-optimization
    - dorkpipe-yaml-workflows
  render:
    list: ./src/bin/dockpipe --package dorkpipe --workflow skills.render -- --list
    codex: ./src/bin/dockpipe --package dorkpipe --workflow skills.render -- --target codex
    claude: ./src/bin/dockpipe --package dorkpipe --workflow skills.render -- --target claude --output <path>

tasks:
  orientation:
    read:
      - AGENTS.md
      - docs/agents/core/repo-map.md
      - docs/agents/core/architecture.md
      - docs/agents/docs/docs-system.md
    optional:
      - docs/README.md
    skills:
      - dorkpipe-token-optimization

  engine_change:
    read:
      - AGENTS.md
      - docs/agents/core/engine-boundary.md
      - docs/agents/core/architecture.md
      - docs/agents/core/package-model.md
      - docs/agents/core/validation-commands.md
    optional:
      - docs/packages/package-model.md
      - docs/concepts/architecture-model.md
      - docs/concepts/capabilities.md
    skills:
      - dorkpipe-core-review
      - dorkpipe-token-optimization
    escalate:
      required_for:
        - public CLI behavior
        - engine boundary changes
        - path/package resolution changes
        - security-sensitive behavior
    validation:
      - go test ./src/lib/...
      - make build

  yaml_workflow_change:
    read:
      - AGENTS.md
      - docs/agents/workflows/yaml-workflows.md
      - docs/agents/core/path-scopes.md
      - docs/agents/core/architecture.md
      - docs/agents/runtime/safety-guardrails.md
      - docs/agents/core/validation-commands.md
    optional:
      - docs/workflows/workflow-yaml.md
      - src/lib/infrastructure/schema/workflow.schema.json
      - src/app/tooling/vscode-extensions/dockpipe-language-support/extension.js
    skills:
      - dorkpipe-yaml-workflows
      - dorkpipe-token-optimization
    validation:
      - ./src/bin/dockpipe workflow validate <config.yml>
      - go test ./src/lib/...

  path_scope_migration:
    read:
      - AGENTS.md
      - docs/agents/core/path-scopes.md
      - docs/agents/workflows/yaml-workflows.md
      - docs/agents/core/package-model.md
      - docs/agents/packages/package-authoring.md
      - docs/agents/core/validation-commands.md
    optional:
      - docs/workflows/workflow-yaml.md
      - src/core/assets/scripts/README.md
      - src/lib/application/sdk_cmd.go
      - src/lib/infrastructure/schema/workflow.schema.json
      - src/app/tooling/vscode-extensions/dockpipe-language-support/extension.js
    skills:
      - dorkpipe-yaml-workflows
      - dorkpipe-package-authoring
      - dorkpipe-core-review
      - dorkpipe-token-optimization
    validation:
      - ./src/bin/dockpipe workflow validate <config.yml>
      - ./src/bin/dockpipe package test --workdir . --only <package>
      - ./src/bin/dockpipe package compile workflows --workdir . --from packages/<package> --force
      - go test ./src/lib/domain ./src/lib/application

  git_runtime_sessions:
    read:
      - AGENTS.md
      - docs/agents/runtime/git-runtime-sessions.md
      - docs/agents/runtime/git-runtime-auth.md
      - docs/agents/core/architecture.md
      - docs/agents/core/engine-boundary.md
      - docs/agents/core/path-scopes.md
      - docs/agents/core/package-model.md
      - docs/agents/core/validation-commands.md
    optional:
      - docs/runtime/git-runtime-sessions.md
      - docs/workflows/workflow-yaml.md
      - src/lib/infrastructure/schema/workflow.schema.json
    skills:
      - dorkpipe-core-review
      - dorkpipe-yaml-workflows
      - dorkpipe-token-optimization
    escalate:
      required_for:
        - public workspace lifecycle fields
        - runtime-owned Git operations
        - autonomous checkpoint or publish behavior
        - managed workspace storage changes
    validation:
      - git diff --check
      - go test ./src/lib/...
      - make build

  package_authoring:
    read:
      - AGENTS.md
      - docs/agents/packages/package-authoring.md
      - docs/agents/core/path-scopes.md
      - docs/agents/core/package-model.md
      - docs/agents/runtime/safety-guardrails.md
      - docs/agents/core/validation-commands.md
    optional:
      - docs/packages/package-model.md
      - docs/packages/package-quickstart.md
    skills:
      - dorkpipe-package-authoring
      - dorkpipe-token-optimization
    validation:
      - ./src/bin/dockpipe package test --workdir . --only <package>
      - ./src/bin/dockpipe package compile workflows --workdir . --from packages/<package> --force
      - ./src/bin/dockpipe package compile resolvers --workdir . --from packages/<package> --force

  package_promotion:
    read:
      - AGENTS.md
      - docs/agents/packages/package-promotion.md
      - docs/agents/packages/package-authoring.md
      - docs/agents/core/package-model.md
      - docs/agents/runtime/safety-guardrails.md
      - docs/agents/core/validation-commands.md
    optional:
      - docs/packages/package-model.md
    skills:
      - dorkpipe-package-authoring
      - dorkpipe-core-review
      - dorkpipe-token-optimization
    validation:
      - find packages/<package> -type f | sort
      - rg -n "<old-name>|<old-script>" packages docs src workflows .github -S
      - ./src/bin/dockpipe package test --workdir . --only <package>
      - ./src/bin/dockpipe package compile workflows --workdir . --from packages/<package> --force
      - ./src/bin/dockpipe package compile resolvers --workdir . --from packages/<package> --force

  agentic_ai_workflow:
    read:
      - AGENTS.md
      - docs/agents/workflows/yaml-workflows.md
      - docs/agents/workflows/ai-workflow-value-bar.md
      - docs/agents/workflows/model-escalation.md
      - docs/agents/workflows/docs-generation.md
      - docs/agents/workflows/planner-promotion-model.md
      - docs/agents/runtime/safety-guardrails.md
      - docs/agents/core/validation-commands.md
    optional:
      - docs/workflows/agentic-workflows.md
      - docs/research/agentic-workflow-research-2026.md
      - packages/dorkpipe/resolvers/dorkpipe/assets/docs/orchestration-contract.md
    skills:
      - dorkpipe-agentic-yaml
      - dorkpipe-yaml-workflows
      - dorkpipe-token-optimization
    escalate:
      required_for:
        - cloud spend policy
        - destructive actions
        - autonomous overnight behavior
        - approval gates
    validation:
      - ./src/bin/dockpipe workflow validate <config.yml>
      - ./src/bin/dockpipe package test --workdir . --only dorkpipe

  tooling_surface_change:
    read:
      - AGENTS.md
      - docs/agents/workflows/tooling-surfaces.md
      - docs/agents/workflows/planner-promotion-model.md
      - docs/agents/workflows/yaml-workflows.md
      - docs/agents/workflows/model-escalation.md
      - docs/agents/core/validation-commands.md
    optional:
      - docs/workflows/agentic-workflows.md
      - docs/workflows/workflow-yaml.md
      - docs/agents/tasks/agentic-app-ui.md
      - src/app/tooling/vscode-extensions/dockpipe-language-support/extension.js
      - packages/pipeon/resolvers/pipeon/vscode-extension/README.md
      - packages/pipeon/resolvers/pipeon/vscode-extension/src/extension.ts
      - packages/pipeon/resolvers/pipeon/vscode-extension/src/webview/chat.ts
    skills:
      - dorkpipe-agentic-yaml
      - dorkpipe-yaml-workflows
      - dorkpipe-token-optimization
    validation:
      - ./src/bin/dockpipe workflow validate <config.yml>
      - npm run typecheck

  docs_generation:
    read:
      - AGENTS.md
      - docs/agents/docs/docs-system.md
      - docs/agents/workflows/docs-generation.md
      - docs/agents/workflows/planner-promotion-model.md
      - docs/agents/docs/token-optimization.md
      - docs/agents/runtime/safety-guardrails.md
      - docs/agents/core/validation-commands.md
    optional:
      - docs/workflows/agentic-workflows.md
      - docs/workflows/workflow-yaml.md
      - packages/dorkpipe/resolvers/dorkpipe/assets/docs/example-brain/index.md
    skills:
      - dorkpipe-agentic-yaml
      - dorkpipe-token-optimization
    validation:
      - ./src/bin/dockpipe workflow validate <config.yml>
      - rg -n "<old-name>|<old-script>" packages docs src workflows .github -S

  artifacts_or_mcp:
    read:
      - AGENTS.md
      - docs/agents/runtime/artifacts-and-mcp.md
      - docs/agents/runtime/safety-guardrails.md
    optional:
      - docs/runtime/artifacts.md
      - packages/dorkpipe-mcp/README.md
      - packages/dorkpipe-mcp/mcpbridge/README.md
    skills:
      - dorkpipe-core-review
    escalate:
      required_for:
        - MCP exec tier
        - artifact regeneration
    validation:
      - git status --short

  docs_or_agent_guidance:
    read:
      - AGENTS.md
      - docs/agents/docs/docs-system.md
      - docs/agents/docs/token-optimization.md
      - docs/agents/docs/skills.md
      - docs/agents/index.yaml
      - docs/agents/task-index.yaml
    skills:
      - dorkpipe-token-optimization
      - dorkpipe-core-review
    validation:
      - ./src/bin/dockpipe --package dorkpipe --workflow skills.render -- --list

  backlog_or_followup_update:
    read:
      - AGENTS.md
      - docs/agents/docs/docs-system.md
      - docs/agents/task-index.yaml
      - docs/agents/core/repo-map.md
      - docs/agents/workflows/planner-promotion-model.md
      - docs/agents/docs/token-optimization.md
    optional:
      - docs/runtime/operation-results.md
      - docs/runtime/git-runtime-sessions.md
      - docs/agents/core/architecture.md
      - packages/dorkpipe/resolvers/dorkpipe/assets/docs/example-brain/index.md
    skills:
      - dorkpipe-token-optimization
      - dorkpipe-core-review
    validation:
      - rg -n "TASK-00|Current State|Still Open" docs/agents/task-index.yaml docs/agents/tasks -S

  skills_render:
    read:
      - AGENTS.md
      - docs/agents/docs/docs-system.md
      - docs/agents/docs/skills.md
      - docs/agents/packages/package-authoring.md
      - packages/dorkpipe/workflows/skills.render/config.yml
    skills:
      - dorkpipe-package-authoring
      - dorkpipe-token-optimization
    validation:
      - ./src/bin/dockpipe --package dorkpipe --workflow skills.render -- --list
      - ./src/bin/dockpipe --package dorkpipe --workflow skills.render -- --target codex --dry-run
      - ./src/bin/dockpipe --package dorkpipe --workflow skills.render -- --target claude --output /tmp/dorkpipe-claude-skills --dry-run

  safety_or_secrets:
    read:
      - AGENTS.md
      - docs/agents/docs/docs-system.md
      - docs/agents/runtime/safety-guardrails.md
      - docs/agents/runtime/artifacts-and-mcp.md
    optional:
      - docs/runtime/vault.md
    skills:
      - dorkpipe-core-review
      - dorkpipe-token-optimization
    escalate:
      required_for:
        - secret handling
        - destructive cleanup
        - permission changes
    validation:
      - git status --short
