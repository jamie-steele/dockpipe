# run = host invokes docker with -p (Dockpipe runner has no port publish). No isolate via dockpipe.
name: vscode
description: OSS browser IDE (code-server) via host docker; project at /work in the server container.

steps:
  - id: code-server
    run: scripts/vscode-code-server.sh
    skip_container: true
    vars:
      CODE_SERVER_IMAGE: "codercom/code-server:latest"
      # Edit here (or dockpipe.yml / imports). You can also set CODE_SERVER_* via shell env or repo `.env`
      # (omit a key from YAML so the env value is used). For password auth, e.g. export CODE_SERVER_PASSWORD=… in CI.
      CODE_SERVER_AUTH: "none" # "none" = no password on 127.0.0.1; "password" = login page (optional CODE_SERVER_PASSWORD).
      # CODE_SERVER_PORT: omit or "auto" for random host port (49152–65535); pin (e.g. 8080) for a stable browser profile path.
      # CODE_SERVER_WAIT_SIGNAL: "connections" (default) = TCP disconnect on 127.0.0.1:PORT; "process" = browser PID polling.
      # CODE_SERVER_DISCONNECT_* — tune TCP disconnect detection (TAIL_MAX, CONFIRM_SEC, POLL_SEC; see template README).
      # CODE_SERVER_BROWSER_WINDOW_TITLE: default "VS Code" (--window-name); set "" to omit.
      # CODE_SERVER_BROWSER_PROFILE_DIR / CODE_SERVER_BROWSER_EXTRA_FLAGS — optional; see template README.
