# Advanced: async group + merged outputs (see docs/workflow-yaml.md)
name: workflow-demo
description: Blocking step → parallel tasks → join (merged env).

isolate: alpine

steps:
  - id: setup
    isolate: alpine
    cmd: sh -c 'echo "[workflow-demo] setup" >&2'
    is_blocking: true

  - group:
      mode: async
      tasks:
        - id: fanout_a
          isolate: alpine
          cmd: sh -c 'mkdir -p .dockpipe && echo "DEMO_BRANCH=a" > .dockpipe/demo-a.env'
          outputs: .dockpipe/demo-a.env
        - id: fanout_b
          isolate: alpine
          cmd: sh -c 'mkdir -p .dockpipe && echo "DEMO_BRANCH=b" > .dockpipe/demo-b.env'
          outputs: .dockpipe/demo-b.env

  - id: join
    isolate: alpine
    cmd: sh -c 'echo "[workflow-demo] join: DEMO_BRANCH=${DEMO_BRANCH:-missing}" >&2'
    is_blocking: true
