# Resolver-driven: image comes from resolvers/<name> (DOCKPIPE_RESOLVER_TEMPLATE), not from this file.
name: llm-worktree
description: Run an AI CLI in a worktree; commit on host. Backend = --resolver (see resolvers/).

run: scripts/clone-worktree.sh
act: scripts/commit-worktree.sh

# Default when --resolver is omitted (prefer this over reusing isolate: for the same purpose).
default_resolver: claude

resolvers:
  - claude
  - codex
  - cursor
  - vscode
  - code-server

vars:
  DOCKPIPE_BRANCH_PREFIX: ""
