# Workflow template config. Loaded when you use --workflow llm-worktree.
# Override with --run, --isolate, --act, --var, --env-file.

name: llm-worktree
description: Run AI in a worktree; commit on host.

# run → isolate → act (paths relative to repo root when under scripts/)
run: scripts/clone-worktree.sh
isolate: claude
act: scripts/commit-worktree.sh

# Resolvers in resolvers/ (claude, codex).
resolvers:
  - claude
  - codex

# Variables: exported before run scripts if not already set in the environment.
# Precedence: shell env (unchanged) < vars below < templates/llm-worktree/.env < repo .env < --env-file < $DOCKPIPE_ENV_FILE < --var
vars:
  # Prefix for auto-generated branch when --repo without --branch (see bin/dockpipe branch logic; also RESOLVER/TEMPLATE).
  DOCKPIPE_BRANCH_PREFIX: ""
