# Plan → apply → validate using Docker (runtime) + Codex (resolver only).
# Customize each step's cmd for your repo (e.g. codex exec "…", or your scripts).
# Substrate is per-step (runtime / resolver); workflow-level runtime is not used.
name: codex-pav
description: Plan, apply, validate — Docker runtime, Codex resolver (requires OPENAI_API_KEY for Codex steps).
platforms: [windows, deb]
dependencies:
  host:
    - id: docker
      command: docker
      description: Required to run the Codex resolver containers.
      install:
        windows: winget install Docker.DockerDesktop
        deb: sudo apt-get update && sudo apt-get install -y docker.io docker-compose-plugin

steps:
  - id: plan
    runtime: dockerimage
    resolver: codex
    isolate: dev
    cmd: sh -c 'echo "[plan] Replace with your plan command (Codex resolver, dev container placeholder)" >&2'
  - id: apply
    runtime: dockerimage
    resolver: codex
    isolate: dev
    cmd: sh -c 'echo "[apply] Replace with your apply command" >&2'
  - id: validate
    runtime: dockerimage
    resolver: codex
    isolate: dev
    cmd: sh -c 'echo "[validate] Replace with your validate command" >&2'
