schema: 1
kind: workflow
name: docs.orchestrate
version: 0.6.0
title: Orchestrated documentation task graph
description: |
  Multi-worker orchestration workflow that splits a docs task into bounded artifacts, runs multiple
  specialized workers, merges results, verifies them, and requires approval.
author: DockPipe
license: Apache-2.0
repository: https://github.com/dockpipe/dockpipe
tags: [workflow, docs, orchestration, dorkpipe, ai]
depends: [dorkpipe]
platforms: [windows, deb]
dependencies:
  host:
    - id: bash
      command: bash
      description: Runs DorkPipe orchestration host scripts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y bash
    - id: docker
      command: docker
      description: Starts the DorkPipe sidecar stack and resolver worker containers.
      install:
        windows: winget install Docker.DockerDesktop
        deb: sudo apt-get update && sudo apt-get install -y docker.io docker-compose-plugin
    - id: git
      command: git
      description: Reads repository state and applies approved generated artifacts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y git
    - id: curl
      command: curl
      description: Checks local Ollama and DorkPipe stack HTTP endpoints.
      install:
        windows: winget install cURL.cURL
        deb: sudo apt-get update && sudo apt-get install -y curl
allow_clone: true
distribution: source
