schema: 1
kind: workflow
name: docs.optimize-orchestrate
version: 0.6.0
title: Ollama + DorkPipe Docs Orchestration Optimizer
description: |
  Local-first optimizer loop that reviews the latest docs.orchestrate artifacts, runs bounded
  Ollama worker analysis, proposes a constrained patch, requires approval, and applies to the
  working tree without committing.
author: DockPipe
license: Apache-2.0
repository: https://github.com/dockpipe/dockpipe
tags: [workflow, docs, orchestration, dorkpipe, ollama, optimizer]
depends: [dorkpipe]
platforms: [windows, deb]
dependencies:
  host:
    - id: bash
      command: bash
      description: Runs DorkPipe optimizer and orchestration host scripts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y bash
    - id: docker
      command: docker
      description: Starts the DorkPipe sidecar stack and resolver worker containers.
      install:
        windows: winget install Docker.DockerDesktop
        deb: sudo apt-get update && sudo apt-get install -y docker.io docker-compose-plugin
    - id: git
      command: git
      description: Reads repository state and validates proposed patch artifacts.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y git
    - id: curl
      command: curl
      description: Checks local Ollama and DorkPipe stack HTTP endpoints.
      install:
        windows: winget install cURL.cURL
        deb: sudo apt-get update && sudo apt-get install -y curl
allow_clone: true
distribution: source
