# Maintainer / dogfood: thin composer — shared vars + nested packaged workflow(s).
# Primary use: run dockpipe.cloudflare.r2infra with this repo’s canonical TF_VAR_* / DOCKPIPE_TF_* / R2_* in one place.
# Add more steps later (e.g. another runtime: package, or host scripts) without duplicating what the package already does.
#
# Run: ./src/bin/dockpipe --workflow package-store-infra --workdir . --
# Terraform: --tf plan | apply (or set DOCKPIPE_TF_COMMANDS). Without --tf, r2-publish exits early when DOCKPIPE_TF_OPTIONAL_WHEN_UNSET=1.
#
# Store tarballs (release/artifacts, packages-store-manifest.json) are not part of this workflow — run
# `dockpipe package build store` when you need a publishable mirror layout (after compile).
#
# Default pre-run: package compile for-workflow for this workflow name (same as other --workflow runs).
# Full compile all first: dockpipe build, then dockpipe --workflow package-store-infra --no-compile-deps
#
# TF_VAR_* defaults below; vault template (secrets.vault_template, e.g. .env.template) overwrites same keys when inject runs.
name: package-store-infra
description: >-
  Shared vars for this repo + nested packaged workflow dockpipe.cloudflare.r2infra (extend with more steps as needed).
  Terraform optional via --tf when DOCKPIPE_TF_OPTIONAL_WHEN_UNSET is set.

docker_preflight: false
vars:
  # R2 bucket + object layout (matches dockpipe bucket in Cloudflare dashboard).
  R2_BUCKET: "dockpipe"
  R2_PREFIX: "packages/"

  # Remote state (same bucket; state/ prefix in R2 UI).
  DOCKPIPE_TF_BACKEND: "remote"
  DOCKPIPE_TF_STATE_BUCKET: "dockpipe"
  DOCKPIPE_TF_STATE_KEY: "state/terraform.tfstate"

  # r2publish only: 1 skips Terraform (e.g. bucket already exists).
  R2_SKIP_TERRAFORM: "0"

  # Nested dockpipe.cloudflare.r2infra: skip Terraform unless --tf (or DOCKPIPE_TF_COMMANDS) is set.
  DOCKPIPE_TF_OPTIONAL_WHEN_UNSET: "1"

  # Terraform module (packages/cloud/.../dockpipe.cloudflare.r2publish): zone, hostname, public CDN + edge flags.
  # Replace placeholders with real zone id (32-char hex) and hostname, or rely on vault template fields zoneid + packages_hostname.
  TF_VAR_zone_id: "REPLACE_WITH_CLOUDFLARE_ZONE_ID"
  TF_VAR_public_hostname: "packages.example.com"
  TF_VAR_enable_r2_custom_domain: "true"
  TF_VAR_r2_custom_domain_enabled: "true"
  TF_VAR_r2_custom_domain_min_tls: "1.2"
  TF_VAR_enable_waf_baseline: "true"
  TF_VAR_enable_cache_rules: "true"
  TF_VAR_cloudflare_managed_ruleset_id: "efb7b8c949ac4650a09736fc376e9aee"
  TF_VAR_cache_edge_ttl_seconds: "86400"
  TF_VAR_cache_browser_ttl_seconds: "3600"

steps:
  # Packaged workflow: packages/cloud/storage/resolvers/r2/dockpipe.cloudflare.r2infra (namespace dockpipe-cloudflare).
  # Parent vars merge first; use --tf plan|apply so DOCKPIPE_TF_COMMANDS is set (see DOCKPIPE_TF_OPTIONAL_WHEN_UNSET).
  - id: r2infra
    runtime: package
    resolver: dockpipe.cloudflare.r2infra
    package: dockpipe-cloudflare
