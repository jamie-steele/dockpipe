name: package-store-infra
description: >-
  Maintainer dogfood: repo-root vars + nested packaged workflow dockpipe.cloudflare.r2infra.
  Run: ./src/bin/dockpipe --workflow package-store-infra --workdir . --
  Terraform: pass --tf plan|apply so DOCKPIPE_TF_COMMANDS is set; with DOCKPIPE_TF_OPTIONAL_WHEN_UNSET=1, Terraform is skipped when unset.
  Vault: secrets.vault_template keys override same-named vars when op inject runs.

docker_preflight: false

types:
  - models/IPackageStoreInfraConfig

vars:
  R2_BUCKET: "dockpipe"  # R2 bucket name (matches dashboard)
  R2_PREFIX: "packages/"  # object key prefix for uploads (r2upload); trailing slash optional in scripts
  R2_PUBLISH_DRY_RUN: "0"  # 1 = dry-run for mapped pipelines
  R2_SKIP_TERRAFORM: "0"  # 1 = r2publish skips Terraform (not used by r2infra-only path)
  R2_STATE_ACCESS_KEY_ID: ""  # alias for state credentials; prefer vault inject
  R2_STATE_SECRET_ACCESS_KEY: ""  # paired with R2_STATE_ACCESS_KEY_ID
  R2_TF_BACKEND: ""  # legacy; maps when DOCKPIPE_TF_BACKEND unset
  R2_TF_IMPORT_R2_BUCKET: ""  # legacy alias
  R2_TF_R2_IMPORT_JURISDICTION: ""  # legacy alias
  R2_TF_STATE_BUCKET: ""  # legacy alias
  R2_TF_STATE_KEY: ""  # legacy alias
  R2_TERRAFORM_APPLY_ARGS: ""  # legacy aliases (see dockpipe.cloudflare.r2infra)
  R2_TERRAFORM_APPLY_AUTO_APPROVE: ""
  R2_TERRAFORM_COMMANDS: ""
  R2_TERRAFORM_FMT_ARGS: ""
  R2_TERRAFORM_IMPORT_ARGS: ""
  R2_TERRAFORM_IMPORT_FILE: ""
  R2_TERRAFORM_INIT_ARGS: ""
  R2_TERRAFORM_PLAN_ARGS: ""
  R2_TERRAFORM_SKIP_INIT: ""
  R2_TERRAFORM_VALIDATE_ARGS: ""
  R2_TERRAFORM_DIR: ""
  R2_TF_LOCATION: ""  # optional TF_VAR_location for module
  CLOUDFLARE_ACCOUNT_ID: ""  # required for Terraform; vault or .env
  CLOUDFLARE_API_TOKEN: ""  # or email + global API key
  CLOUDFLARE_EMAIL: ""
  CLOUDFLARE_GLOBAL_API_KEY: ""
  DOCKPIPE_TF_APPLY_ARGS: ""  # extra args for terraform apply
  DOCKPIPE_TF_APPLY_AUTO_APPROVE: "1"
  DOCKPIPE_TF_ATTACH_CLOUDFLARE_PROVIDER: "1"  # inherited by nested r2infra
  DOCKPIPE_TF_BACKEND: "remote"
  DOCKPIPE_TF_BACKEND_HCL_PATH: ""  # temp path when runner generates backend; usually empty
  DOCKPIPE_TF_CLOUDFLARE_ACCOUNT_ID: ""  # optional override for remote backend writer
  DOCKPIPE_TF_COMMANDS: ""  # set via --tf plan or apply
  DOCKPIPE_TF_DRY_RUN: "0"
  DOCKPIPE_TF_FMT_ARGS: ""  # extra terraform fmt args
  DOCKPIPE_TF_IMPORT_ARGS: ""  # single-line import
  DOCKPIPE_TF_IMPORT_FILE: ""  # import file path
  DOCKPIPE_TF_IMPORT_R2_BUCKET: "0"
  DOCKPIPE_TF_INIT_ARGS: "-reconfigure"  # safe after changing state bucket/key; set "" if not needed
  DOCKPIPE_TF_MODULE_DIR: ""  # optional explicit path; else nested workflow finds bundled module
  DOCKPIPE_TF_OPTIONAL_WHEN_UNSET: "1"  # skip Terraform when no --tf and no DOCKPIPE_TF_COMMANDS
  DOCKPIPE_TF_PIPELINE_HINT: ""  # rarely set
  DOCKPIPE_TF_PLAN_ARGS: ""  # extra terraform plan args
  DOCKPIPE_TF_REMOTE_BACKEND_FILE: ""  # pre-made backend HCL; else generated R2 backend
  DOCKPIPE_TF_R2_IMPORT_JURISDICTION: "default"
  DOCKPIPE_TF_SKIP_INIT: "0"
  DOCKPIPE_TF_STATE_ACCESS_KEY_ID: ""  # state bucket S3 keys; vault inject
  DOCKPIPE_TF_STATE_BUCKET: "dockpipe-tfstate"  # dedicated state bucket (not R2_BUCKET)
  DOCKPIPE_TF_STATE_KEY: "state/terraform.tfstate"  # object key for remote state
  DOCKPIPE_TF_STATE_SECRET_ACCESS_KEY: ""  # paired with state access key id
  DOCKPIPE_TF_USE_R2_PUBLISH_MAP: "1"  # keep 1 for nested r2infra
  DOCKPIPE_TF_VALIDATE_ARGS: ""  # extra terraform validate args
  DOCKPIPE_TF_WORKSPACE: ""  # non-default workspace name
  TF_VAR_cache_browser_ttl_seconds: "3600"  # module: browser TTL seconds
  TF_VAR_cache_edge_ttl_seconds: "86400"  # module: edge TTL seconds
  TF_VAR_cloudflare_managed_ruleset_id: "efb7b8c949ac4650a09736fc376e9aee"  # Cloudflare managed ruleset UUID
  TF_VAR_enable_cache_rules: "true"  # true|false
  TF_VAR_enable_r2_custom_domain: "true"  # true|false
  TF_VAR_enable_waf_baseline: "true"  # true|false
  TF_VAR_public_hostname: "packages.example.com"  # hostname for CDN rules
  TF_VAR_r2_custom_domain_enabled: "true"  # true|false
  TF_VAR_r2_custom_domain_min_tls: "1.2"  # e.g. 1.0 | 1.2 | 1.3
  TF_VAR_zone_id: "REPLACE_WITH_CLOUDFLARE_ZONE_ID"  # 32-char hex zone id

steps:
  - id: r2infra
    workflow: dockpipe.cloudflare.r2infra
    package: dockpipe-cloudflare
