# Host-only: surface DorkPipe CI signals after running govulncheck + gosec on the host (see ci-local.sh).
# Pair with workflows/ci/test for the full Docker-isolated CI chain.
name: dockpipe-repo-quality
description: >-
  Print a short summary of DorkPipe-normalized CI scans. Run after ci-local or CI scan steps.

docker_preflight: false
# Host-only step — no workflow-level runtime (substrate is per step when you add container steps).

steps:
  - id: summarize
    kind: host
    cwd: repo
    scopes:
      source: repo
      artifacts: artifacts
    run:
      - scripts/dockpipe/repo-ci-summary.sh
