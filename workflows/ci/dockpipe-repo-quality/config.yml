# Host-only: surface DorkPipe CI signals after a CI run writes ci-analysis artifacts.
# Pair with workflows/ci/ci-emulate for the GitHub Actions-shaped local CI chain.
name: dockpipe-repo-quality
description: >-
  Print a short summary of DorkPipe-normalized CI scans. Run after ci-emulate or GitHub CI scan steps.
platforms: [windows, deb]
dependencies:
  host:
    - id: bash
      command: bash
      description: Required to run the repository CI summary script.
      install:
        windows: winget install Git.Git
        deb: sudo apt-get update && sudo apt-get install -y bash

docker_preflight: false
# Host-only step — no workflow-level runtime (substrate is per step when you add container steps).

steps:
  - id: summarize
    kind: host
    cwd: repo
    scopes:
      source: repo
      artifacts: artifacts
    run:
      - scripts/dockpipe/repo-ci-summary.sh
