# Same checks as the Linux CI job, but this multi-step workflow runs them inside Docker.
# Canonical path in this repo: workflows/ci/test. Host job still runs govulncheck/gosec/go test first for fast signal; this workflow mirrors the stack in isolation.
# Mount only $(go env GOPATH)/pkg:/go/pkg — do NOT mount host GOBIN: govulncheck/gosec must be built with the
# container Go (e.g. 1.25); a host-built binary often mismatches and breaks vulncheck.
# Images: golang official (pulls from Docker Hub on first use).
# DOCKPIPE_DOCKER_NETWORK=host: many Linux setups have no working IPv6 from Docker bridge; Go then
# cannot reach proxy.golang.org for go install / govulncheck. Host network matches the host stack.
name: test
vault: none
types:
  - models/ITestWorkflowConfig
vars:
  DOCKPIPE_DOCKER_NETWORK: host
description: >-
  Isolation preamble → verify artifact → go test → go vet → govulncheck → gosec → security brief.
  Tools are go install’d inside the image (match container Go); mount GOPATH/pkg only. govulncheck needs outbound HTTPS to vuln.go.dev.

steps:
  - id: prepare
    isolate: golang:1.25.11-bookworm
    outputs: prepare.env
    vars:
      HOME: /tmp/dockpipe-home
    cmd: |-
      bash -c 'set -euo pipefail
      export HOME=/tmp/dockpipe-home
      mkdir -p "$HOME"
      export DOCKPIPE_WORKDIR="${DOCKPIPE_WORKDIR:-$(pwd)}"
      source src/core/assets/scripts/lib/dockpipe-sdk.sh
      DEMO_DIR="$(dockpipe_sdk scope artifacts demo)"
      DEMO_FILE="$DEMO_DIR/main.go"
      echo "[demo] ================================================================="
      echo "[demo] Isolation — each step runs in a fresh container; your repo is mounted"
      echo "[demo] at /work with your UID/GID mapped. Containers are removed after each step."
      echo "[demo] ================================================================="
      mkdir -p "$DEMO_DIR"
      printf "%s\n" "package main" "func main() {}" > "$DEMO_FILE"
      SHA=$(sha256sum "$DEMO_FILE" | cut -b1-64)
      printf "%s\n" "ARTIFACT_SHA256=$SHA" "DEMO_FILE=$DEMO_FILE" "DEMO_STAGE=prepare" > "$DOCKPIPE_STEP_OUTPUTS_FILE"
      echo "[demo] step 1/3 prepare — wrote demo artifact + checksum for next step"'

  - id: scan
    isolate: golang:1.25.11-bookworm
    outputs: scan.env
    vars:
      HOME: /tmp/dockpipe-home
    cmd: |-
      bash -c 'set -euo pipefail
      export HOME=/tmp/dockpipe-home
      mkdir -p "$HOME"
      source src/core/assets/scripts/lib/dockpipe-sdk.sh
      GO_ARTIFACT_DIR="$(dockpipe_sdk scope artifacts go)"
      export TMPDIR="$GO_ARTIFACT_DIR/tmp"
      export GOTMPDIR="$GO_ARTIFACT_DIR/gotmp"
      export GOCACHE="$GO_ARTIFACT_DIR/gocache"
      export GOBIN="$GO_ARTIFACT_DIR/bin"
      mkdir -p "$TMPDIR" "$GOTMPDIR" "$GOCACHE" "$GOBIN"
      echo "[demo] --- Step 2: verify artifact + full Go + security scan (same spirit as CI / ci-local.sh) ---"
      test -n "${ARTIFACT_SHA256:-}" || { echo "[demo] FAIL missing ARTIFACT_SHA256"; exit 1; }
      test -f "$DEMO_FILE" || { echo "[demo] FAIL missing $DEMO_FILE"; exit 1; }
      GOT=$(sha256sum "$DEMO_FILE" | cut -b1-64)
      test "$GOT" = "$ARTIFACT_SHA256" || { echo "[demo] FAIL checksum mismatch"; exit 1; }
      echo "[demo] Checksum OK — same bytes on disk as in step 1."
      export PATH="$GOBIN:$(go env GOPATH)/bin:$PATH"
      echo "[demo] Running: go test ./..."
      go test ./...
      echo "[demo] Running: go vet ./..."
      go vet ./...
      echo "[demo] go install govulncheck + gosec (must match container Go — do not use host GOBIN in Docker)"
      go install golang.org/x/vuln/cmd/govulncheck@latest
      go install github.com/securego/gosec/v2/cmd/gosec@latest
      echo "[demo] Running: govulncheck ./..."
      govulncheck ./...
      echo "[demo] Running: gosec (first-party only — exclude .gomodcache if present under the repo)"
      gosec -conf .gosec.json -fmt text -stdout -exclude-dir=.gomodcache ./...
      echo "[demo] Container scan finished OK (go test + vet + govulncheck + gosec)."
      printf "%s\n" "VERIFY_OK=1" "SCAN_PASS=1" "DEMO_STAGE=scan" > "$DOCKPIPE_STEP_OUTPUTS_FILE"'

  - id: report
    isolate: golang:1.25.11-bookworm
    vars:
      HOME: /tmp/dockpipe-home
    cmd: |-
      bash -c 'set -euo pipefail
      export HOME=/tmp/dockpipe-home
      mkdir -p "$HOME"
      test "${SCAN_PASS:-0}" = "1" || { echo "[demo] FAIL SCAN_PASS not set"; exit 1; }
      echo "[demo] step 3/3 report — SCAN_PASS=$SCAN_PASS VERIFY_OK=$VERIFY_OK"
      echo "[demo] --- Security brief (bundled demo narrative — not a live LLM call) ---"
      echo "[demo] • Isolation: commands run in disposable containers; only the bind-mounted"
      echo "[demo]   workdir persists between steps; review images and workflow YAML like CI."
      echo "[demo] • Data paths: treat host run:/act: scripts as part of your trust boundary."
      echo "[demo] • Supply chain: pin image digests in production; this workflow uses"
      echo "[demo]   golang:1.25-bookworm for reproducible test runs."
      echo "[demo] • For an actual model-driven security review, use a resolver workflow"
      echo "[demo]   (e.g. Codex) with your policy — this block is static showcase copy."
      echo "[demo] pipeline complete — go test + vet + govulncheck + gosec in isolation + security brief emitted"'
