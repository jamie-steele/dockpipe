# Dogfood / internal: publish a tarball to Cloudflare R2 (S3-compatible API) from the host.
# Copy to your project with: dockpipe init r2-publish --from shipyard/workflows/r2-publish
# (or point --workflow-file at this directory).
#
# Secrets and options are passed the same way as other workflows:
#   --var KEY=VAL / --env KEY=VAL  (--var wins on conflict)
#   --env-file path, workflow-dir .env, repo .env, DOCKPIPE_ENV_FILE
# Typical: R2_BUCKET, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN (or AWS_ACCESS_KEY_ID/SECRET),
#   R2_STATE_* for Terraform remote state on R2, R2_TF_BACKEND=local to skip remote state.
name: r2-publish
description: >-
  Host-only: compress R2_PUBLISH_SOURCE (default ./release/artifacts) and upload to R2.
  Use R2 S3 keys + aws s3, or a single CLOUDFLARE_API_TOKEN (Terraform creates bucket, Wrangler uploads).
  See README.

docker_preflight: false
runtime: cli
resolver: codex
runtimes: [cli]
resolvers: [codex]

vars:
  R2_PUBLISH_SOURCE: "release/artifacts"

steps:
  - id: upload
    skip_container: true
    run:
      - scripts/dockpipe/r2-publish.sh
