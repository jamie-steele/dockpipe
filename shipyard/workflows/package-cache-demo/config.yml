# Host-only: prints how to reuse Docker named volumes for Flathub + APT caches (no core changes).
name: package-cache-demo
category: app
description: >-
  Ensures dockpipe-flatpak-system, dockpipe-apt-cache, dockpipe-apt-lists volumes and prints docker/dockpipe examples.
  Set DOCKER_PACKAGE_CACHE_DEMO_RUN=1 to run a quick apt-get update in debian:bookworm-slim using those caches.

docker_preflight: true

steps:
  - id: demo
    run: scripts/docker-package-cache-demo.sh
    skip_container: true
