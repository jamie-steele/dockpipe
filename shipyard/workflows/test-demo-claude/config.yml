# Same chain as test-demo, but the final step uses resolver claude + claude image (swap vs Codex).
# Requires ANTHROPIC_API_KEY or CLAUDE_API_KEY for the review step.
name: test-demo-claude
description: >-
  Real chain: metadata → go test ./... → go vet ./... → Claude Code review (non-interactive -p).
  Swap with workflow test-demo to compare Codex vs Claude on the same pipeline shape.

runtime: docker
resolver: claude
runtimes: [docker, cli]
resolvers: [claude]

steps:
  - id: prepare
    runtime: docker
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      mkdir -p .dockpipe/demo
      printf "%s\n" \
        "WORKFLOW_NAME=test-demo-claude" \
        "PREPARE_OK=1" \
        "DEMO_STAGE=prepare" \
        > .dockpipe/outputs.env
      echo "[test-demo-claude] prepare: workflow chain initialized"'

  - id: gotest
    runtime: docker
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      mkdir -p .dockpipe
      set +e
      go test ./... -count=1
      tc=$?
      set -e
      tp=0
      if [ "$tc" -eq 0 ]; then tp=1; fi
      printf "%s\n" "TESTS_PASS=$tp" "TESTS_EXIT=$tc" "DEMO_STAGE=gotest" > .dockpipe/outputs.env
      echo "[test-demo-claude] go test finished exit=$tc"
      exit "$tc"'

  - id: scan
    runtime: docker
    isolate: golang:1.25-bookworm
    cmd: |-
      bash -c 'set -euo pipefail
      test "${TESTS_PASS:-0}" = "1" || { echo "[test-demo-claude] go test did not pass; skipping go vet" >&2; exit 1; }
      set +e
      go vet ./...
      vc=$?
      set -e
      sp=0
      if [ "$vc" -eq 0 ]; then sp=1; fi
      printf "%s\n" "SCAN_PASS=$sp" "VET_EXIT=$vc" "DEMO_STAGE=scan" > .dockpipe/outputs.env
      echo "[test-demo-claude] go vet finished exit=$vc"
      exit "$vc"'

  - id: review
    runtime: docker
    resolver: claude
    isolate: claude
    cmd: |-
      bash -c 'set -euo pipefail
      test "${SCAN_PASS:-0}" = "1" || { echo "[test-demo-claude] scan did not pass; skipping Claude review" >&2; exit 1; }
      test -n "${ANTHROPIC_API_KEY:-}${CLAUDE_API_KEY:-}" || { echo "[test-demo-claude] ANTHROPIC_API_KEY or CLAUDE_API_KEY is required for the Claude review step" >&2; exit 1; }
      PROMPT_FILE="dockpipe-experimental/workflows/test-demo/prompts/claude-chain-review.md"
      test -f "$PROMPT_FILE" || { echo "[test-demo-claude] missing $PROMPT_FILE" >&2; exit 1; }
      PROMPT=$(cat "$PROMPT_FILE"; echo ""; echo "--- Workflow context (DockPipe merged outputs) ---"; echo "WORKFLOW_NAME=${WORKFLOW_NAME:-}"; echo "PREPARE_OK=${PREPARE_OK:-}"; echo "TESTS_PASS=${TESTS_PASS:-}"; echo "TESTS_EXIT=${TESTS_EXIT:-}"; echo "SCAN_PASS=${SCAN_PASS:-}"; echo "VET_EXIT=${VET_EXIT:-}"; echo "DEMO_STAGE=${DEMO_STAGE:-}")
      claude --dangerously-skip-permissions -p "$PROMPT"'
